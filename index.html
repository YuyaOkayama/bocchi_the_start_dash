<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="uft-8">
    <script src="main.js"></script>
    <title>SD練習</title>
    <h1>SD</h1>
</head>

<body>
    <button class="play_stop" id="play_btn" onclick="clicked()">再生</button>
    <span id="status_text" style="margin-left: 10px; font-weight: bold; color: red; display: none;">再生中</span>
    <div>
        <h1>再生 ~ on your marks</h1>
        <table>
            <tr>
                <td>最速</td>
                <td><input type="range" min="0" max="10" value="0" step="0.5" id="f_marks_sli"></td>
                <td><a id="f_marks_sec"></a></td>
            </tr>
            <tr>
                <td>最遅</td>
                <td><input type="range" min="0" max="10" value="0" step="0.5" id="l_marks_sli"></td>
                <td><a id="l_marks_sec"></a></td>
            </tr>
        </table>
    </div>
    <div>
        <h1>on your marks ~ set</h1>
        <table>
            <tr>
                <td>最速</td>
                <td><input type="range" min="0" max="20" value="10" step="0.5" id="f_set_sli"></td>
                <td><a id="f_set_sec"></a></td>
            </tr>
            <tr>
                <td>最遅</td>
                <td><input type="range" min="0" max="20" value="15" step="0.5" id="l_set_sli"></td>
                <td><a id="l_set_sec"></a></td>
            </tr>
        </table>
    </div>
    <div>
        <h1>set ~ start</h1>
        <table>
            <tr>
                <td>最速</td>
                <td><input type="range" min="0" max="4" value="2" step="0.5" id="f_start_sli"></td>
                <td><a id="f_start_sec"></a></td>
            </tr>
            <tr>
                <td>最遅</td>
                <td><input type="range" min="0" max="4" value="3" step="0.5" id="l_start_sli"></td>
                <td><a id="l_start_sec"></a></td>
            </tr>
        </table>
    </div>
    <div>
        <button class="reset" id="reset_btn" onclick="reset()">リセット</button>
    </div>
</body>
